<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Gravity Quest - Uma aventura épica de plataforma retro.">
    <title>Gravity Quest | Super-Bako-69</title>
    <link rel="stylesheet" href="./src/style.css">
    <!-- Google Fonts for a premium look -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Outfit:wght@300;400;700&display=swap" rel="stylesheet">
</head>
<body>
    <main id="app-viewport">
        <section id="game-wrapper">
            <!-- Start Screen -->
            <div id="start-screen" class="overlay active">
                <div class="retro-border">
                    <h1 class="game-title">GRAVITY QUEST</h1>
                    <div class="menu-options">
                        <button id="start-btn" class="retro-btn">1 PLAYER GAME</button>
                    </div>
                    <div class="copyright">© 2026 SUPER-BAKO-69 CO.</div>
                </div>
            </div>

            <!-- Game Layer -->
            <div id="game-container">
                <canvas id="gameCanvas" width="256" height="224"></canvas>
                
                <!-- HUD Overlay (SMB Style) -->
                <header id="hud" class="retro-hud">
                    <div class="hud-column">
                        <span>MARIO</span>
                        <span id="score">000000</span>
                    </div>
                    <div class="hud-column">
                        <span>&nbsp;</span>
                        <span id="coins">x00</span>
                    </div>
                    <div class="hud-column">
                        <span>WORLD</span>
                        <span>1-1</span>
                    </div>
                    <div class="hud-column">
                        <span>TIME</span>
                        <span id="time">400</span>
                    </div>
                </header>
            </div>

            <!-- Game Over Screen -->
            <div id="game-over-screen" class="overlay">
                <div class="content">
                    <h2 class="status-title">GAME OVER</h2>
                    <button id="restart-btn" class="retro-btn">RETRY</button>
                </div>
            </div>
        </section>
    </main>

    <!-- Game Scripts -->
    <script src="./src/game.js"></script>
</body>
</html>
